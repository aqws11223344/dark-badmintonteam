<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>羽球成績登記</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Noto Sans TC", "PingFang TC", sans-serif;
    margin: 0; padding: 16px; background: #f7f7f9; color: #222;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #777; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  input, select, textarea {
    width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ddd;
    border-radius: 8px; background: #fff;
  }
  textarea { min-height: 60px; resize: vertical; }
  button {
    width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
    color: #fff; background: #06c755; border: 0; border-radius: 8px; margin-top: 16px;
  }
  button.secondary { background: #eee; color: #333; }
  button:disabled { opacity: .5; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #222; color: #fff; padding: 10px 16px; border-radius: 24px; font-size: 14px;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .partner-row { display: none; }
  .partner-row.show { display: block; }
  .hint { font-size: 12px; color: #999; margin-top: 4px; }
</style>
</head>
<body>

<h1>🏸 羽球成績登記</h1>
<div class="sub" id="who">正在載入...</div>
<div class="sub" style="color:#06c755;font-weight:500;">💡 組別若清單沒有你要的可直接輸入；賽事只能從下拉選單選</div>

<form id="form" class="card">
  <label>姓名 <span style="color:#e00">*</span></label>
  <input name="player_name" required placeholder="例：Hans" />
  <div class="hint">可以填本名或球場綽號</div>

  <label>賽事 <span style="color:#e00">*</span></label>
  <select name="tournament" required></select>
  <div class="hint">由群組管理員用 LINE 指令維護清單</div>

  <label>組別</label>
  <input name="category" list="categories" placeholder="例：公開" />
  <datalist id="categories"></datalist>
  <div class="hint">可自行輸入組別</div>

  <label>項目 <span style="color:#e00">*</span></label>
  <select name="event" required></select>

  <div class="partner-row" id="partner-row">
    <label id="partner-label">搭檔</label>
    <div id="members-container"></div>
    <button type="button" id="add-member-btn" style="display:none; background:#eee; color:#333; padding:8px; margin-top:6px;">+ 新增隊員</button>
  </div>

  <label>名次 <span style="color:#e00">*</span></label>
  <select name="rank" required></select>

  <label>備註（選填）</label>
  <textarea name="note"></textarea>

  <button type="submit" id="submit-btn">送出</button>
  <button type="button" class="secondary" id="another-btn" style="display:none">再新增一筆</button>
</form>

<div class="toast" id="toast"></div>

<script>
const $ = sel => document.querySelector(sel);
const form = $("#form");
const partnerRow = $("#partner-row");

function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function fillDatalist(id, items) {
  const el = document.getElementById(id);
  el.innerHTML = items.map(v => `<option value="${v}"></option>`).join("");
}

function fillSelect(name, items, preselect) {
  const el = form.elements[name];
  el.innerHTML = items.map(v => `<option value="${v}" ${v===preselect?"selected":""}>${v}</option>`).join("");
}

let me = null;

async function init() {
  const params = new URLSearchParams(location.search);
  const tournamentFromURL = params.get("t") || "";

  const cfg = await fetch("/api/options").then(r => r.json());
  const opts = cfg.options || cfg;
  const liffId = cfg.liff_id;

  try {
    if (liffId) {
      await liff.init({ liffId });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      me = await liff.getProfile();
      $("#who").textContent = `輸入人：${me.displayName}`;
    } else {
      throw new Error("no LIFF ID configured");
    }
  } catch (e) {
    console.warn("LIFF init failed, using test mode:", e);
    $("#who").textContent = "（測試模式：未連接 LINE）";
    me = { userId: "test-user", displayName: "測試員" };
  }

  // 賽事改成 <select>：若清單為空提示訊息；若 URL 帶的賽事不在清單內也塞進去讓使用者可選
  let tournaments = opts.tournaments || [];
  if (tournamentFromURL && !tournaments.includes(tournamentFromURL)) {
    tournaments = [tournamentFromURL, ...tournaments];
  }
  if (tournaments.length === 0) {
    form.elements["tournament"].innerHTML = '<option value="">（管理員尚未新增賽事）</option>';
  } else {
    fillSelect("tournament", tournaments, tournamentFromURL || tournaments[0]);
  }

  fillDatalist("categories", opts.categories);
  fillSelect("event", opts.events);
  fillSelect("rank", opts.ranks);

  togglePartnerRow();
  form.elements["event"].addEventListener("change", togglePartnerRow);
}

function togglePartnerRow() {
  const v = form.elements["event"].value;
  const isDouble = v.includes("雙");
  const isTeam = v === "團體";
  const partnerLabel = $("#partner-label");
  const addBtn = $("#add-member-btn");
  const container = $("#members-container");

  if (isDouble) {
    partnerRow.classList.add("show");
    partnerLabel.textContent = "搭檔";
    addBtn.style.display = "none";
    container.innerHTML = '<input class="member-input" placeholder="例：李大華（隊外也可填）" />';
  } else if (isTeam) {
    partnerRow.classList.add("show");
    partnerLabel.textContent = "隊員";
    addBtn.style.display = "block";
    if (container.children.length === 0) {
      addMemberInput();
      addMemberInput(); // 預設兩格
    }
  } else {
    partnerRow.classList.remove("show");
    container.innerHTML = "";
    addBtn.style.display = "none";
  }
}

function addMemberInput() {
  const container = $("#members-container");
  const idx = container.children.length + 1;
  const wrapper = document.createElement("div");
  wrapper.style.cssText = "display:flex; gap:6px; margin-bottom:6px;";
  wrapper.innerHTML = `
    <input class="member-input" placeholder="隊員 ${idx}" style="flex:1;" />
    <button type="button" class="remove-member" style="background:#fee; color:#c00; padding:6px 12px; width:auto;">×</button>
  `;
  wrapper.querySelector(".remove-member").addEventListener("click", () => {
    wrapper.remove();
  });
  container.appendChild(wrapper);
}

document.getElementById("add-member-btn").addEventListener("click", addMemberInput);

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("#submit-btn");
  btn.disabled = true;

  const fd = new FormData(form);

  // 蒐集隊員/搭檔（雙打 1 個，團體多個）
  const members = Array.from(document.querySelectorAll(".member-input"))
    .map(el => el.value.trim())
    .filter(v => v !== "");
  const partner = members.join(", ");

  const body = {
    user_id: me.userId,
    user_name: me.displayName,
    player_name: (fd.get("player_name") || "").trim(),
    tournament: (fd.get("tournament") || "").trim(),
    category: (fd.get("category") || "").trim(),
    event: fd.get("event"),
    partner: partner,
    rank: fd.get("rank"),
    note: (fd.get("note") || "").trim(),
  };

  try {
    const resp = await fetch("/api/results", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(await resp.text());
    toast("✅ 已送出");
    $("#another-btn").style.display = "block";
    btn.textContent = "已送出";
  } catch (err) {
    console.error(err);
    toast("❌ 送出失敗：" + err.message);
    btn.disabled = false;
  }
});

$("#another-btn").addEventListener("click", () => {
  // 保留姓名、賽事、組別；清空其他
  form.elements["note"].value = "";
  form.elements["event"].selectedIndex = 0;
  form.elements["rank"].selectedIndex = 0;
  $("#members-container").innerHTML = ""; // 清掉所有搭檔/隊員
  togglePartnerRow();
  $("#submit-btn").disabled = false;
  $("#submit-btn").textContent = "送出";
  $("#another-btn").style.display = "none";
  window.scrollTo({ top: 0, behavior: "smooth" });
});

init();
</script>
</body>
</html>
