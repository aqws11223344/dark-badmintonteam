# Cloud Build pipeline：push main 觸發
# 優化：
#   1. 每次 build 前先 pull latest image 當 layer cache
#   2. 用 --cache-from 讓 Docker 重用前次的 mod download 層
#   3. E2_HIGHCPU_8 機型（8 vCPU），build 快很多

substitutions:
  _REGION: asia-east1
  _SERVICE: badminton-bot
  _REPO: cloud-run-source-deploy

steps:
  # 1. 拉取上一次的 image 當快取（第一次沒有會失敗，忽略）
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest || exit 0

  # 2. Build（利用 cache-from）
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .

  # 3. Push
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

  # 4. Deploy 到 Cloud Run（只換 image，保留既有 env / secrets）
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  # machineType 不指定 = 用預設 e2-standard-1（每日 120 分鐘免費）
  # 想加速可改 E2_HIGHCPU_8（快很多但付費 ~$0.3/次）
