# 每次 push 到 main 時，Cloud Build 會執行這個檔案：
# 1. build Docker image
# 2. push 到 Artifact Registry
# 3. 部署到 Cloud Run（沿用現有的 env vars / secrets 設定）

substitutions:
  _REGION: asia-east1
  _SERVICE: badminton-bot
  _REPO: cloud-run-source-deploy

steps:
  # 1. Build image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

  # 3. Deploy to Cloud Run（只換 image，保留既有 env / secrets / IAM）
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
